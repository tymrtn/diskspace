# Unity/Unreal rules intentionally omitted: `**/Library` and `**/Intermediate`
# are too broad for safe glob detection. These engines require sibling-directory
# context checks (e.g., adjacent Assets/ or .uproject file) that the current
# rule engine cannot express. PRs welcome with a safer detection approach.

