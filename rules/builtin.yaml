# ── On-device AI models silently downloaded by Chromium-family browsers ───────
#
# Chrome (and other Chromium forks) download "Gemini Nano" / TFLite helpers in
# the background to power features like "Help me write". On Windows this lands
# as ~4 GB at OptGuideOnDeviceModel/weights.bin; on macOS it's smaller TFLite
# files under optimization_guide_model_store/. Either way, the browser will
# re-download them unless the user disables on-device AI in Settings first.

- id: chrome-on-device-ai-models
  category: app-cache
  path_pattern: "~/Library/Application Support/Google/Chrome/optimization_guide_model_store"
  base_confidence: 0.55
  reason: "Chrome on-device AI models (Gemini Nano / TFLite). Re-downloads unless on-device AI is disabled in Chrome settings."
  consequences:
    recovery: redownload
    impact: "Chrome re-fetches these unless you first turn off Settings → System → On-device AI (or set chrome://flags 'Optimization guide on device model' → Disabled). Disables Help-me-write and related features."
    recovery_cmd: "Re-enable On-device AI in Chrome → Settings → System"

