# disk-advisor built-in rule library
# Confidence: 0.0–1.0 (modified at runtime by profile domain, recency, liveness)
# Contributing: add a rule here with a PR — no Rust required.

# ── Dev Artifacts ──────────────────────────────────────────────────────────────

- id: xcode-derived-data
  category: dev-artifact
  path_pattern: "~/Library/Developer/Xcode/DerivedData"
  domain: ios_development
  base_confidence: 0.85
  reason: "Xcode rebuilds this automatically on next build"
  exclude_if_recent_modified_days: 3
  consequences:
    recovery: rebuild
    rebuild_seconds: 300
    impact: "Next Xcode build of any existing project will recompile from scratch (~2-10 min)"
    recovery_cmd: "(automatic on next Xcode build)"

- id: xcode-archives
  category: dev-artifact
  path_pattern: "~/Library/Developer/Xcode/Archives"
  domain: ios_development
  base_confidence: 0.70
  reason: "Old Xcode build archives — keep only if you distribute those builds"
  exclude_if_recent_modified_days: 7

