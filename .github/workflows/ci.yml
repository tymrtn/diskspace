name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        # Runs the unit tests (incl. the scope-fence guards in metrics.rs that
        # assert check.rs / candidate.rs never reference `metrics`) AND the
        # tests/ integration guards (incl. the finding-6 selfcheck read-only
        # check). Keeps the metrics scope fence enforced in CI, not just locally.
        run: cargo test --all-features
      - name: selfcheck measurement gate (G1-G7 runtime fence)
        # The runtime counterpart to the unit proofs: re-verifies the P1
        # measurement invariants (provenance/confidence, rollup idempotency,
        # in-place growth caught + df stays advisory, rename continuity, lock
        # integrity, $HOME-scope/no-sudo, cost budget) against a throwaway temp
        # scratch dir. Exits non-zero on any violation so the branch can't merge
        # with the fence broken.
        run: cargo run --quiet -- selfcheck --measurement --json
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo fmt check
        run: cargo fmt --check

  build-release:
    name: Build universal binary
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build ARM64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin
      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/diskspace \
            target/x86_64-apple-darwin/release/diskspace \
            -output target/release/diskspace-universal
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: diskspace-macos-universal
          path: target/release/diskspace-universal
