name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --all-features
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo fmt check
        run: cargo fmt --check

  build-release:
    name: Build universal binary
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build ARM64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin
      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/disk-space \
            target/x86_64-apple-darwin/release/disk-space \
            -output target/release/disk-space-universal
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: disk-space-macos-universal
          path: target/release/disk-space-universal
